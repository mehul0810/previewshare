name: Prerelease

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Prerelease tag to package, for example v1.0.0-rc.1.
        required: true
        type: string
  push:
    tags:
      - 'v*.*.*-*'

permissions:
  contents: write

env:
  PLUGIN_SLUG: previewshare

jobs:
  build:
    name: Build prerelease artifact
    runs-on: ubuntu-latest
    steps:
      - name: Resolve prerelease context
        id: release
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG_NAME="${INPUT_TAG}"
          else
            TAG_NAME="${REF_NAME}"
          fi

          if [[ -z "${TAG_NAME}" ]]; then
            echo "A prerelease tag is required." >&2
            exit 1
          fi

          if [[ ! "${TAG_NAME}" =~ ^v?[0-9]+[.][0-9]+[.][0-9]+[-][0-9A-Za-z.-]+$ ]]; then
            echo "Prerelease tag must look like v1.0.0-rc.1." >&2
            exit 1
          fi

          echo "tag=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "zip_file=${PLUGIN_SLUG}-${TAG_NAME}.zip" >> "${GITHUB_OUTPUT}"
          echo "artifact_name=${PLUGIN_SLUG}-prerelease-${TAG_NAME}" >> "${GITHUB_OUTPUT}"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0

      - name: Validate prerelease version
        shell: bash
        env:
          TAG_NAME: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail

          PLUGIN_VERSION="$(awk -F: '/^[[:space:]]*\\* Version:/ { gsub(/^[[:space:]]+|[[:space:]]+$/, "", $2); print $2; exit }' previewshare.php)"
          TAG_VERSION="${TAG_NAME#v}"
          TAG_BASE="${TAG_VERSION%%-*}"

          if [[ "${PLUGIN_VERSION}" != "${TAG_VERSION}" && "${PLUGIN_VERSION}" != "${TAG_BASE}" ]]; then
            echo "Plugin header version (${PLUGIN_VERSION}) must match tag (${TAG_VERSION}) or prerelease base (${TAG_BASE})." >&2
            exit 1
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist

      - name: Validate Composer metadata
        run: composer validate --no-check-publish --no-interaction

      - name: Run PHP syntax checks
        run: find . -path ./vendor -prune -o -path ./node_modules -prune -o -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse -c phpstan.neon

      - name: Install JS dependencies
        run: npm ci

      - name: Build production zip
        run: npm run plugin-zip

      - name: Validate production zip
        run: npm run validate:zip

      - name: Rename artifact
        run: mv previewshare.zip "${{ steps.release.outputs.zip_file }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release.outputs.artifact_name }}
          path: ${{ steps.release.outputs.zip_file }}
          if-no-files-found: error
          retention-days: 30

      - name: Attach artifact to GitHub prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release.outputs.tag }}
          ZIP_FILE: ${{ steps.release.outputs.zip_file }}
        run: |
          set -euo pipefail

          NOTES="Production-ready PreviewShare prerelease artifact."

          if gh release view "${TAG_NAME}" > /dev/null 2>&1; then
            gh release edit "${TAG_NAME}" --prerelease
            gh release upload "${TAG_NAME}" "${ZIP_FILE}" --clobber
          else
            gh release create "${TAG_NAME}" "${ZIP_FILE}" --title "${TAG_NAME}" --notes "${NOTES}" --prerelease --verify-tag
          fi
