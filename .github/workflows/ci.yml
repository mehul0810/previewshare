name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  php:
    name: PHP checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring
          coverage: pcov
      - name: Get Composer Cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
      - name: Install Composer deps
        run: composer install --no-progress --prefer-dist
      - name: Validate Composer metadata
        run: composer validate --no-check-publish --no-interaction
      - name: Audit Composer dependencies
        run: composer audit:php
      - name: Run PHP syntax checks
        run: composer lint
      - name: Run PHP coding standards
        run: composer check-cs
      - name: Run PHPUnit
        run: composer test
      - name: Run PHPUnit coverage smoke
        run: composer test:coverage
      - name: Run PHPStan
        run: vendor/bin/phpstan analyse -c phpstan.neon

  js:
    name: JS build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Audit production npm dependencies
        run: npm run audit:prod
      - name: Lint JavaScript
        run: npm run lint:js
      - name: Lint CSS
        run: npm run lint:css
      - name: Run JavaScript unit tests
        run: npm run test:js
      - name: Build assets
        run: npm run build

  package:
    name: Release package smoke
    runs-on: ubuntu-latest
    needs: [ php, js ]
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install JS dependencies
        run: npm ci
      - name: Build plugin zip
        run: npm run plugin-zip
      - name: Validate plugin zip
        run: npm run validate:zip
