name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  php:
    name: PHP checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring
      - name: Get Composer Cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
      - name: Install Composer deps
        run: composer install --no-progress --prefer-dist
      - name: Validate Composer metadata
        run: composer validate --no-check-publish --no-interaction
      - name: Run PHP syntax checks
        run: find . -path ./vendor -prune -o -path ./node_modules -prune -o -name '*.php' -print0 | xargs -0 -n1 php -l
      - name: Run PHPStan
        run: vendor/bin/phpstan analyse -c phpstan.neon

  js:
    name: JS build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Build assets
        run: npm run build

  package:
    name: Release package smoke
    runs-on: ubuntu-latest
    needs: [ php, js ]
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install JS dependencies
        run: npm ci
      - name: Build assets
        run: npm run build
      - name: Build plugin zip
        run: npm run plugin-zip
